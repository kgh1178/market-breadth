<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Market Fear Index</title>
  <link rel="stylesheet" href="/fear-greed/widget.css">
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <div class="eyebrow" id="eyebrow">Risk Snapshot</div>
        <h1 id="title">Market Fear Index</h1>
        <p class="copy" id="copy">Compare fear conditions across the US, Korea, Japan, and crypto in one compact widget.</p>
      </div>
      <div class="stamp">
        <span id="updatedLabel">Updated</span>
        <strong id="updatedValue">Loading…</strong>
      </div>
    </section>

    <section class="status-row">
      <span class="status-pill" id="statusPill">Loading…</span>
      <span class="status-copy" id="statusCopy">Fetching `/fear-greed/api/latest.json`.</span>
    </section>

    <section class="market-grid" id="marketGrid" aria-live="polite"></section>

    <div class="footer-actions">
      <a class="primary" href="/fear-greed/dashboard" id="dashboardLink">전체 대시보드</a>
    </div>
  </div>
  <script src="/fear-greed/widget.js"></script>
</body>
</html>
