<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Exchange Dashboard</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f6f7f9;color:#1f2328}
    .wrap{max-width:920px;margin:0 auto;padding:32px 18px 52px}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:26px;padding:26px;box-shadow:0 18px 36px rgba(15,23,42,.06)}
    .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#66707a;font-weight:700}
    h1{margin:10px 0 12px;font-size:38px;letter-spacing:-.03em}
    p{margin:0;color:#66707a;line-height:1.7}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    a{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:10px 14px;text-decoration:none;font-weight:700;font-size:13px}
    .primary{background:#1a73e8;color:#fff}
    .ghost{border:1px solid #1a73e8;color:#1a73e8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="eyebrow" id="eyebrow">Placeholder Dashboard</div>
      <h1 id="title">Exchange Dashboard</h1>
      <p id="copy">This dashboard route is prepared so exchange tools can land under the same app-prefix architecture without changing the Cloudflare layout later.</p>
      <div class="actions">
        <a class="primary" href="/exchange" id="widgetLink">Widget</a>
        <a class="ghost" href="/" id="homeLink">App Hub</a>
      </div>
    </div>
  </div>
<script>
const I18N={en:{eyebrow:'Placeholder Dashboard',title:'Exchange Dashboard',copy:'This dashboard route is prepared so exchange tools can land under the same app-prefix architecture without changing the Cloudflare layout later.',widget:'Widget',home:'App Hub'},ko:{eyebrow:'플레이스홀더 대시보드',title:'환율 대시보드',copy:'향후 환율 도구도 Cloudflare 레이아웃을 바꾸지 않고 같은 앱 prefix 구조 아래에서 붙일 수 있도록 이 대시보드 경로를 먼저 마련했습니다.',widget:'위젯',home:'앱 허브'},ja:{eyebrow:'プレースホルダーダッシュボード',title:'為替ダッシュボード',copy:'今後の為替ツールも Cloudflare レイアウトを変えずに同じアプリ prefix 構造の下へ追加できるよう、このダッシュボード経路を先に準備しています。',widget:'ウィジェット',home:'アプリハブ'}};
const param=new URLSearchParams(window.location.search).get('lang');
const langs=[...(navigator.languages||[]),navigator.language].filter(Boolean).map(v=>String(v).toLowerCase());
const lang=param&&['ko','ja','en'].includes(param)?param:langs.some(v=>v.startsWith('ko'))?'ko':langs.some(v=>v.startsWith('ja'))?'ja':'en';
const t=I18N[lang];
document.documentElement.lang=lang;
document.getElementById('eyebrow').textContent=t.eyebrow;
document.getElementById('title').textContent=t.title;
document.getElementById('copy').textContent=t.copy;
document.getElementById('widgetLink').textContent=t.widget;
document.getElementById('homeLink').textContent=t.home;
</script>
</body>
</html>
