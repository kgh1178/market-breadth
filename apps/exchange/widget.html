<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Exchange Widget</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#fafbfc;color:#1f2328}
    .wrap{max-width:760px;margin:0 auto;padding:28px 18px 48px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:24px;box-shadow:0 18px 36px rgba(15,23,42,.06)}
    .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#66707a;font-weight:700}
    h1{margin:10px 0 12px;font-size:34px;letter-spacing:-.03em}
    p{margin:0;color:#66707a;line-height:1.65}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    a{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:10px 14px;text-decoration:none;font-weight:700;font-size:13px}
    .primary{background:#1a73e8;color:#fff}
    .ghost{border:1px solid #1a73e8;color:#1a73e8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow" id="eyebrow">Placeholder App</div>
      <h1 id="title">Exchange Widget</h1>
      <p id="copy">This route is reserved for the future exchange-rate widget and follows the same Cloudflare multi-app path pattern.</p>
      <div class="actions">
        <a class="primary" href="/exchange/dashboard" id="dashboardLink">Dashboard</a>
        <a class="ghost" href="/" id="homeLink">App Hub</a>
      </div>
    </div>
  </div>
<script>
const I18N={en:{eyebrow:'Placeholder App',title:'Exchange Widget',copy:'This route is reserved for the future exchange-rate widget and follows the same Cloudflare multi-app path pattern.',dashboard:'Dashboard',home:'App Hub'},ko:{eyebrow:'플레이스홀더 앱',title:'환율 위젯',copy:'이 경로는 향후 환율 위젯용으로 예약되어 있으며, 같은 Cloudflare 멀티앱 경로 규칙을 따릅니다.',dashboard:'대시보드',home:'앱 허브'},ja:{eyebrow:'プレースホルダーアプリ',title:'為替ウィジェット',copy:'この経路は今後の為替ウィジェット用に予約されており、同じ Cloudflare マルチアプリ経路規約に従います。',dashboard:'ダッシュボード',home:'アプリハブ'}};
const param=new URLSearchParams(window.location.search).get('lang');
const langs=[...(navigator.languages||[]),navigator.language].filter(Boolean).map(v=>String(v).toLowerCase());
const lang=param&&['ko','ja','en'].includes(param)?param:langs.some(v=>v.startsWith('ko'))?'ko':langs.some(v=>v.startsWith('ja'))?'ja':'en';
const t=I18N[lang];
document.documentElement.lang=lang;
document.getElementById('eyebrow').textContent=t.eyebrow;
document.getElementById('title').textContent=t.title;
document.getElementById('copy').textContent=t.copy;
document.getElementById('dashboardLink').textContent=t.dashboard;
document.getElementById('homeLink').textContent=t.home;
</script>
</body>
</html>
