<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Global Market Breadth</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',
         'Noto Sans KR',sans-serif;background:#fff;color:#333;
         max-width:800px;margin:0 auto}
    .hdr{padding:12px 16px;border-bottom:1px solid #e0e0e0;
         display:flex;justify-content:space-between;align-items:center}
    .hdr h2{font-size:15px;font-weight:700}
    .hdr .dt{font-size:11px;color:#888}
    .hdr .warn{color:#f9ab00;font-size:11px;margin-left:6px}
    .tabs{display:flex;border-bottom:1px solid #e0e0e0}
    .tab{flex:1;padding:8px;text-align:center;font-size:13px;
         cursor:pointer;border-bottom:2px solid transparent;
         transition:all .2s}
    .tab:hover{background:#f8f9fa}
    .tab.on{color:var(--tab-color,#1a73e8);border-bottom-color:var(--tab-color,#1a73e8);font-weight:600}
    .legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 16px 4px;
            border-bottom:1px solid #f3f4f6}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#555}
    .legend-line{width:22px;height:0;border-top-width:3px;border-top-style:solid}
    .legend-note{font-size:10px;color:#888}
    .chart{width:100%;height:300px}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);
           gap:8px;padding:12px 16px}
    .card{background:#f8f9fa;border-radius:8px;padding:10px;
          text-align:center;position:relative;border:1px solid transparent}
    .card.t20{border-color:#f59e0b;background:#fff9eb;box-shadow:0 10px 22px rgba(245,158,11,.14)}
    .card.t10{border-color:#dc2626;background:#fff1f2;box-shadow:0 12px 24px rgba(220,38,38,.16)}
    .card .v{font-size:22px;font-weight:700}
    .card .l{font-size:11px;color:#666;margin-top:2px}
    .card .detail{font-size:11px;color:#5f6368;margin-top:4px}
    .card .note{font-size:10px;color:#b26a00;margin-top:4px}
    .card .basis{font-size:10px;color:#9aa0a6;margin-top:6px}
    .card .thresholds{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
    .card .threshold-badge{display:inline-flex;align-items:center;padding:2px 8px;
      border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.01em}
    .card .threshold-badge.enter20{background:#f59e0b;color:#fff}
    .card .threshold-badge.enter10{background:#dc2626;color:#fff}
    .card .threshold-badge.below20{background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
    .card .threshold-badge.below10{background:#fff1f2;color:#be123c;border:1px solid #fda4af}
    .card .ci{height:4px;background:#e0e0e0;border-radius:2px;
              margin-top:6px;position:relative;overflow:hidden}
    .card .ci-f{height:100%;border-radius:2px;position:absolute}
    .card .tip{display:none;position:absolute;bottom:calc(100% + 6px);
               left:50%;transform:translateX(-50%);background:#333;
               color:#fff;padding:4px 8px;border-radius:4px;
               font-size:10px;white-space:nowrap;z-index:10}
    .card:hover .tip{display:block}
    .bull{color:#0d904f} .bear{color:#d93025} .neut{color:#f9ab00}
    .extra{padding:4px 16px;font-size:12px;color:#555}
    .sig{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 10px;border-radius:10px;
           font-size:11px;font-weight:600}
    .b-long{background:#e6f4ea;color:#0d904f}
    .b-short{background:#fce8e6;color:#d93025}
    .b-neut{background:#fef7e0;color:#f9ab00}
    .b-off{background:#f1f3f4;color:#5f6368}
    .msg{margin:0 16px 8px;padding:8px 10px;border-radius:8px;
         font-size:12px;line-height:1.4}
    .msg.warn{background:#fef7e0;color:#8d6e00}
    .msg.err{background:#fce8e6;color:#b3261e}
    .ftr{padding:8px 16px;font-size:10px;color:#aaa;text-align:right;
         border-top:1px solid #f0f0f0}
    .ftr a{color:#1a73e8;text-decoration:none}
  </style>
</head>
<body>
  <div class="hdr">
    <h2 id="hdrTitle">Global Market Breadth</h2>
    <div><span class="dt" id="dt">Loading...</span>
         <span class="warn" id="warn"></span></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="legend" id="legend"></div>
  <div class="cards" id="cards"></div>
  <div class="extra" id="extra"></div>
  <div id="msg"></div>
  <div class="chart" id="chart"></div>
  <div class="sig" id="sig"></div>
  <div class="ftr">
    <span id="footerMeta">Data: yfinance+pykrx | Engine: market_breadth v3.1 |</span>
    <a id="footerLink" href="/breadth/dashboard">Full Dashboard</a>

function detectLocale(){
  const param=new URLSearchParams(window.location.search).get('lang');
  if(param && ['ko','ja','en'].includes(param)) return param;
  const langs=[...(navigator.languages||[]), navigator.language].filter(Boolean).map(x=>String(x).toLowerCase());
  if(langs.some(x=>x.startsWith('ko'))) return 'ko';
  if(langs.some(x=>x.startsWith('ja'))) return 'ja';
  return 'en';
}

const LOCALE=detectLocale();

function t(key, vars={}){
  const dict=TRANSLATIONS[LOCALE] || TRANSLATIONS.en;
  let text=dict[key] ?? TRANSLATIONS.en[key] ?? key;
  Object.entries(vars).forEach(([name,val])=>{
    text=text.replaceAll(`{${name}}`, String(val));
  });
  return text;
}

function statusText(status){
  return t(`status_${status || 'error'}`);
}

function marketLabel(item){
  return t(item.labelKey);
}

function signalLabel(key){
  return t(`signal_${key}`);
}

function directionLabel(direction){
  return t(`direction_${direction || 'NEUTRAL'}`);
}

document.documentElement.lang=LOCALE;
document.title=t('page_title');

const API_DEFAULT='https://api.jstockinsight.kr/breadth/api';
const API_LOCAL=`${window.location.origin}/breadth/api`;
const API_PARAM=new URLSearchParams(window.location.search).get('api_base');
const B=API_PARAM||(window.location.hostname==='127.0.0.1'||window.location.hostname==='localhost'
  ?API_LOCAL
  :API_DEFAULT);

const M=[
  {id:'sp500',labelKey:'market_sp500',c:'#0f766e',c200:'#67b8b1',lineStyle:0,lineWidth:4,legendClass:'us',noteKey:'note_us'},
  {id:'nikkei225',labelKey:'market_nikkei225',c:'#1a73e8',c200:'#7baaf7',lineStyle:0,lineWidth:3,legendClass:'jp',noteKey:'note_jp'},
  {id:'kospi200',labelKey:'market_kospi200',c:'#ea4335',c200:'#f28b82',lineStyle:0,lineWidth:2,legendClass:'kr',noteKey:'note_kr'},
  {id:'global50',labelKey:'market_global50',c:'#555',lineStyle:0,lineWidth:2,legendClass:'gl',noteKey:'note_global50'},
  {id:'global200',labelKey:'market_global200',c:'#555',lineStyle:0,lineWidth:2,legendClass:'gl',noteKey:'note_global200'}
];
let chart,activeSeries=[],cur='sp500';

function applyStaticText(){
  document.getElementById('hdrTitle').textContent=t('header_title');
  document.getElementById('dt').textContent=t('loading');
  document.getElementById('footerMeta').textContent=t('footer_meta');
  document.getElementById('footerLink').textContent=t('footer_link');
}

function marketMeta(latest, marketId){
  return latest[marketId] || {};
}

function marketAvailable(latest, marketId){
  const meta = marketMeta(latest, marketId);
  return meta.status === 'ok' && meta.series_valid === true;
}

function setMessage(text, kind='warn'){
  const el=document.getElementById('msg');
  el.innerHTML=text?`<div class="msg ${kind}">${text}</div>`:'';
}

function setChartVisible(visible){
  document.getElementById('chart').style.display=visible?'block':'none';
}

function clearChartSeries(){
  activeSeries.forEach(s=>chart.removeSeries(s));
  activeSeries=[];
}

function renderLegend(mid){
  const isGlobal=mid.startsWith('global');
  const items=isGlobal?M.slice(0,3):[M.find(x=>x.id===mid)];
  const extra=isGlobal
    ? `<span class="legend-note">${t('legend_global_extra')}</span>`
    : `<span class="legend-note">${t('legend_single_extra')}</span>`;
  document.getElementById('legend').innerHTML=items.map(item=>`
    <div class="legend-item">
      <span class="legend-line ${item.legendClass}" style="border-top-color:${item.c};border-top-width:${item.lineWidth}px"></span>
      <span>${marketLabel(item)}</span>
      <span class="legend-note">${t(item.noteKey)}</span>
    </div>
  `).join('')+extra;
}

function updateActiveTabs(mid){
  document.querySelectorAll('.tab').forEach(t=>{
    const isOn=t.dataset.m===mid;
    const meta=M.find(x=>x.id===t.dataset.m) || {c:'#1a73e8'};
    t.classList.toggle('on',isOn);
    t.style.setProperty('--tab-color',isOn ? meta.c : '#1a73e8');
  });
}

function thresholdVisualState(threshold){
  if(!threshold) return {cardClass:'', badges:''};
  const badges=[];
  let cardClass='';
  if(threshold.entered_lt10_today){
    badges.push(`<span class="threshold-badge enter10">${t('threshold_entered_10')}</span>`);
    cardClass='t10';
  }else if(threshold.entered_lt20_today){
    badges.push(`<span class="threshold-badge enter20">${t('threshold_entered_20')}</span>`);
    cardClass='t20';
  }else if(threshold.lt10){
    badges.push(`<span class="threshold-badge below10">${t('threshold_below_10')}</span>`);
    cardClass='t10';
  }else if(threshold.lt20){
    badges.push(`<span class="threshold-badge below20">${t('threshold_below_20')}</span>`);
    cardClass='t20';
  }
  return {
    cardClass,
    badges: badges.length ? `<div class="thresholds">${badges.join('')}</div>` : ''
  };
}

function mkCard(label,val,unit,lo,hi,deff,neff,icc,above,valid,excluded=0,accentColor=null,threshold=null){
  if(val==null) val='-';
  const isZ=unit==='σ';
  const n=isZ?parseFloat(val)||0:parseFloat(val)||50;
  const cls=isZ?(n>1?'bull':n<-1?'bear':'neut'):
    (n>60?'bull':n<20?'bear':'neut');
  const valueStyle=accentColor?` style="color:${accentColor}"`:'';
  let ciH='';
  if(lo!=null&&hi!=null){
    const bg=cls==='bull'?'#a8dab5':cls==='bear'?'#f5bcb5':'#fce094';
    ciH=`<div class="ci"><div class="ci-f" style="left:${lo}%;width:${hi-lo}%;background:${bg}"></div></div>`;
  }
  let tipText=(deff!=null)?
    `CI [${lo}, ${hi}], DEFF=${deff}, n_eff=${neff}, ICC=${icc||'?'}`:'';
  if(above!=null && valid!=null){
    tipText=tipText?`(${above}/${valid}) | `+tipText:`(${above}/${valid})`;
  }
  const detail=(above!=null && valid!=null)?`<div class="detail">(${above}/${valid})</div>`:'';
  const note=excluded>0?`<div class="note">${t('symbols_excluded',{count:excluded})}</div>`:'';
  const basis=unit==='%'?`<div class="basis">${t('price_basis_short')}</div>`:'';
  const thresholdUi=unit==='%'?thresholdVisualState(threshold):{cardClass:'',badges:''};
  return`<div class="card ${thresholdUi.cardClass}">
    ${tipText?`<div class="tip">${tipText}</div>`:''}
    ${thresholdUi.badges}
    <div class="v ${cls}"${valueStyle}>${val}${unit}</div>
    <div class="l">${label}</div>${detail}${ciH}${note}${basis}</div>`;
}

function mkStatusCard(label, value){
  return`<div class="card">
    <div class="v neut">${value||'-'}</div>
    <div class="l">${label}</div>
  </div>`;
}

function init(){
  try{
    chart=createChart(document.getElementById('chart'),{
      width:document.getElementById('chart').clientWidth,height:300,
      layout:{background:{color:'#fff'},textColor:'#333',fontSize:11},
      grid:{vertLines:{color:'#f0f0f0'},horzLines:{color:'#f0f0f0'}},
      timeScale:{timeVisible:false},
      rightPriceScale:{scaleMargins:{top:.08,bottom:.05}},
    });
    const r50=chart.addLineSeries({color:'#bbb',lineWidth:1,lineStyle:1,priceLineVisible:false,lastValueVisible:false});
    r50.setData([{time:'2023-01-01',value:50},{time:'2028-01-01',value:50}]);
    const r20=chart.addLineSeries({color:'#fca5a5',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
    r20.setData([{time:'2023-01-01',value:20},{time:'2028-01-01',value:20}]);
    const r10=chart.addLineSeries({color:'#ef4444',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
    r10.setData([{time:'2023-01-01',value:10},{time:'2028-01-01',value:10}]);
  }catch(err){
    document.getElementById('dt').textContent=t('init_error',{message:err.message || err});
    console.error('Init Error:', err);
  }
}

async function load(mid){
  if(!chart){
    if(!document.getElementById('dt').textContent.includes(t('init_error',{message:''}).split('{message}')[0])){
      document.getElementById('dt').textContent=t('chart_not_initialized');
    }
    return;
  }
  cur=mid;
  const cb='?t='+new Date().getTime();
  try{
    const [ltR,sgR]=await Promise.all([
      fetch(`${B}/latest.json${cb}`),fetch(`${B}/signals.json${cb}`)
    ]);
    const lt=await ltR.json(),sg=await sgR.json();
    const isGlobal=mid.startsWith('global');
    renderLegend(mid);

    clearChartSeries();
    setMessage('');
    setChartVisible(true);

    document.getElementById('dt').textContent=t('updated',{date:lt.date});
    document.getElementById('warn').textContent='';
    if(!isGlobal){
      const d=lt[mid]||{};
      document.getElementById('warn').textContent=
        (d.status==='ok'&&d.ex_div_flag)?`⚠ ${t('ex_div_window')}`:'';
    }

    const cards=document.getElementById('cards');
    if(isGlobal){
      const w=mid==='global50'?'50':'200';
      cards.innerHTML=[0,1,2].map(idx=>{
        const d=lt[M[idx].id]||{};
        const above=d[`n_above_${w}`] ?? d[`count_above_${w}`];
        const threshold=d.thresholds?.[`breadth_${w}`];
        return d.status==='ok'
          ? mkCard(marketLabel(M[idx]),d[`breadth_${w}`],'%',null,null,null,null,null,above,d[`n_valid_${w}`],d.n_excluded_50||0,M[idx].c,threshold)
          : mkStatusCard(marketLabel(M[idx]),d.error_message||t('unavailable'));
      }).join('');
    }else{
      const d=lt[mid]||{};
      const marketMeta=M.find(x=>x.id===mid)||M[0];
      cards.innerHTML=d.status==='ok' ? [
        mkCard(t('label_50_day'),d.breadth_50,'%',d.ci_lower_50,d.ci_upper_50,d.deff_50,d.n_eff_50,d.icc_estimate||d.estimated_icc,d.n_above_50??d.count_above_50,d.n_valid_50,d.n_excluded_50||0,marketMeta.c,d.thresholds?.breadth_50),
        mkCard(t('label_200_day'),d.breadth_200,'%',d.ci_lower_200,d.ci_upper_200,d.deff_200,d.n_eff_200,d.icc_estimate||d.estimated_icc,d.n_above_200??d.count_above_200,d.n_valid_200,d.n_excluded_200||0,marketMeta.c,d.thresholds?.breadth_200),
        mkCard(t('label_logit_z'),d.logit_z_50,'σ',null,null)
      ].join('') : [
        mkStatusCard(t('market_status'),statusText(d.status||'error')),
        mkStatusCard(t('error_code'),d.error_code||'-'),
        mkStatusCard(t('as_of'),d.as_of_date||'-'),
      ].join('');
    }

    const ex=document.getElementById('extra');
    let exH='';
    if(!isGlobal){
      const d=lt[mid]||{};
      if(d.status==='ok'&&mid==='nikkei225'&&d.pwds_50!=null)
        exH+=`${t('pwds')}: <b>${d.pwds_50>0?'+':''}${d.pwds_50}</b>%p `;
      if(d.status==='ok'&&mid==='kospi200'&&d.ex_top5_spread_50!=null)
        exH+=`${t('ex_top5')}: <b>${d.ex_top5_spread_50>0?'+':''}${d.ex_top5_spread_50}</b>%p `;
    }
    ex.innerHTML=exH;

    if(isGlobal){
      const marketIds=['sp500','nikkei225','kospi200'];
      const available=marketIds.filter(id=>marketAvailable(lt,id));
      const unavailable=marketIds.filter(id=>!marketAvailable(lt,id));
      if(unavailable.length){
        setMessage(t('unavailable_list',{markets:unavailable.map(id=>marketLabel(M.find(x=>x.id===id))).join(', ')}),'warn');
      }
      if(!available.length){
        setChartVisible(false);
        setMessage(t('no_market_series'),'err');
      }else{
        const w=mid==='global50'?'breadth_50':'breadth_200';
        const resps=await Promise.all(available.map(id=>fetch(`${B}/${id}.json${cb}`)));
        const tss=await Promise.all(resps.map(r=>r.json()));
        tss.forEach((ts,idx)=>{
          const marketId=available[idx];
          const meta=M.find(x=>x.id===marketId);
          const is200=mid==='global200';
          const s=chart.addLineSeries({
            color:is200?meta.c200:meta.c,
            lineWidth:is200?Math.max(2, meta.lineWidth-1):meta.lineWidth,
            lineStyle:meta.lineStyle,
            title:marketLabel(meta)
          });
          activeSeries.push(s);
          s.setData((ts[w]||[]).map(x=>({time:x.date,value:x.value})));
        });
        chart.timeScale().fitContent();
      }
    }else{
      const d=lt[mid]||{};
      if(marketAvailable(lt,mid)){
        const ts=await (await fetch(`${B}/${mid}.json${cb}`)).json();
        const marketMeta=M.find(x=>x.id===mid)||M[0];
        const s50=chart.addLineSeries({
          color:marketMeta.c,
          lineWidth:marketMeta.lineWidth,
          lineStyle:marketMeta.lineStyle,
          title:t('label_50_day')
        });
        const s200=chart.addLineSeries({color:marketMeta.c200,lineWidth:Math.max(2, marketMeta.lineWidth-1),lineStyle:0,title:t('label_200_day')});
        activeSeries.push(s50,s200);
        s50.setData((ts.breadth_50||[]).map(x=>({time:x.date,value:x.value})));
        s200.setData((ts.breadth_200||[]).map(x=>({time:x.date,value:x.value})));
        chart.timeScale().fitContent();
      }else{
        setChartVisible(false);
        setMessage(d.error_message||t('latest_update_failed_market'),'err');
      }
    }

    const sigEl=document.getElementById('sig');
    let sH='';
    if(sg.signals){
      for(const [k,v] of Object.entries(sg.signals)){
        if(!v.valid) continue;
        const dir=v.direction||'NEUTRAL';
        const cls=dir==='LONG'?'b-long':dir==='SHORT'?'b-short':'b-neut';
        sH+=`<span class="badge ${cls}">${signalLabel(k)}: ${directionLabel(dir)}</span>`;
      }
    }
    if(sg.partial_data){
      sH+=`<span class="badge b-off">${t('missing_market_data')}</span>`;
    }
    sigEl.innerHTML=sH;

    updateActiveTabs(mid);
  }catch(err){
    document.getElementById('dt').textContent=t('init_error',{message:err.message || err});
    console.error(err);
  }
}

const tb=document.getElementById('tabs');
M.forEach(m=>{
  const t=document.createElement('div');
  t.className='tab';t.dataset.m=m.id;t.textContent=marketLabel(m);
  t.onclick=()=>load(m.id);tb.appendChild(t);
});

applyStaticText();
init();load('sp500');

new ResizeObserver(()=>{
  if(chart){
    chart.applyOptions({width:document.getElementById('chart').clientWidth});
  }
}).observe(document.getElementById('chart'));
</script>
</body>
</html>
