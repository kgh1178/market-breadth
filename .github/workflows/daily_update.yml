name: Daily Breadth Update

on:
  schedule:
    # UTC 06:30 (미국 장 마감 후) + UTC 08:00 (일본 장 마감 후)
    - cron: '30 6 * * 1-5'
    - cron: '0 8 * * 1-5'
  workflow_dispatch:   # 수동 실행 허용

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Run breadth pipeline
        run: python scripts/generate_json.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Validate JSON outputs
        run: |
          python -c "
          import json, sys, pathlib
          api_dir = pathlib.Path('docs/api')
          files = list(api_dir.glob('*.json'))
          print(f'Found {len(files)} JSON files')
          assert len(files) >= 3, f'Expected >=3 files, got {len(files)}'
          for f in files:
              d = json.loads(f.read_text())
              assert isinstance(d, (dict, list)), f'{f.name} invalid JSON'
          latest = json.loads((api_dir / 'latest.json').read_text())
          assert 'date' in latest, 'latest.json missing date'
          assert 'pipeline_date' in latest, 'latest.json missing pipeline_date'
          metadata = json.loads((api_dir / 'metadata.json').read_text())
          signals = json.loads((api_dir / 'signals.json').read_text())
          assert metadata['price_basis'].startswith('split-adjusted'), 'metadata missing price_basis'
          assert metadata['yfinance_auto_adjust'] is False, 'metadata yfinance_auto_adjust must be false'
          assert metadata['price_column'] == 'Close', 'metadata price_column must be Close'
          required_markets = ['sp500', 'nikkei225', 'kospi200']
          required_market_fields = [
              'status', 'as_of_date', 'series_valid', 'metrics_valid',
              'price_basis',
              'error_code', 'error_message'
          ]
          for market in required_markets:
              assert market in latest, f'latest.json missing {market}'
              payload = latest[market]
              for field in required_market_fields:
                  assert field in payload, f'{market} missing {field}'
              series_path = api_dir / f'{market}.json'
              if payload['status'] == 'ok':
                  assert payload['series_valid'] is True, f'{market} should have valid series'
                  assert payload['metrics_valid'] is True, f'{market} should have valid metrics'
                  assert payload['as_of_date'], f'{market} missing as_of_date'
                  assert payload['price_basis'] == 'split-adjusted, dividend-unadjusted', f'{market} invalid price_basis'
                  assert series_path.exists(), f'{market}.json missing for ok market'
                  series = json.loads(series_path.read_text())
                  assert 'breadth_50' in series and 'breadth_200' in series, f'{market} series missing breadth keys'
              else:
                  assert payload['status'] in ['partial', 'error'], f'{market} invalid status'
                  assert payload['series_valid'] is False, f'{market} should not have series'
                  assert payload['metrics_valid'] is False, f'{market} should not have metrics'
                  assert not series_path.exists(), f'{market}.json should be removed for error market'
          assert 'partial_data' in signals, 'signals.json missing partial_data'
          assert 'signals' in signals, 'signals.json missing signals'
          for name, signal in signals['signals'].items():
              for field in ['valid', 'required_markets', 'missing_markets', 'invalid_reason']:
                  assert field in signal, f'{name} missing {field}'
          print('✅ JSON validation passed')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --staged --quiet || \
            git commit -m "data: $(date -u +%Y-%m-%d) breadth update"
          git push
